---
# Systemd-managed OpenClaw Gateway running as the openclaw system user.

- name: Ensure npm global prefix directory exists
  ansible.builtin.file:
    path: "{{ openclaw_npm_prefix }}"
    state: directory
    owner: "{{ openclaw_system_user }}"
    group: "{{ openclaw_system_user }}"
    mode: "0755"

- name: Configure npm global prefix for OpenClaw user
  ansible.builtin.copy:
    dest: "{{ openclaw_system_user_home }}/.npmrc"
    owner: "{{ openclaw_system_user }}"
    group: "{{ openclaw_system_user }}"
    mode: "0600"
    content: |
      prefix={{ openclaw_npm_prefix }}

# Install as root with --prefix to avoid become_user → unprivileged temp-dir ACL/chmod issues on some hosts.
- name: Check for OpenClaw CLI binary
  ansible.builtin.stat:
    path: "{{ openclaw_npm_prefix }}/bin/openclaw"
  register: openclaw_cli_bin

- name: Read installed OpenClaw package version (for pinned npm versions)
  ansible.builtin.slurp:
    src: "{{ openclaw_npm_prefix }}/lib/node_modules/{{ openclaw_npm_package }}/package.json"
  register: openclaw_npm_package_json
  when:
    - openclaw_cli_bin.stat.exists | default(false)
    - openclaw_npm_version != "latest"
    - not (openclaw_npm_install_force | default(false) | bool)
  failed_when: false

- name: Decide whether OpenClaw npm install is needed
  ansible.builtin.set_fact:
    openclaw_npm_install_needed: >-
      {{
        (openclaw_npm_install_force | default(false) | bool)
        or (not (openclaw_cli_bin.stat.exists | default(false)))
        or (
          openclaw_npm_version != "latest"
          and (
            (openclaw_npm_package_json.skipped | default(false))
            or (openclaw_npm_package_json.failed | default(false))
            or (openclaw_npm_package_json.content is not defined)
            or (
              (openclaw_npm_package_json.content | b64decode | from_json).version | default("")
              != openclaw_npm_version
            )
          )
        )
      }}

- name: Install OpenClaw CLI (npm global under service prefix)
  ansible.builtin.command: npm install -g --prefix {{ openclaw_npm_prefix }} {{ openclaw_npm_package }}@{{ openclaw_npm_version }}
  environment:
    PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
  register: openclaw_npm_install
  when: openclaw_npm_install_needed | bool
  changed_when: true

- name: Ensure OpenClaw npm prefix tree is owned by service user
  ansible.builtin.file:
    path: "{{ openclaw_npm_prefix }}"
    state: directory
    owner: "{{ openclaw_system_user }}"
    group: "{{ openclaw_system_user }}"
    recurse: true
  when: openclaw_npm_install_needed | bool

# Real binary lives under {{ openclaw_npm_prefix }}/bin (not on default PATH).
- name: Confirm OpenClaw CLI binary exists for PATH symlink
  ansible.builtin.stat:
    path: "{{ openclaw_npm_prefix }}/bin/openclaw"
  register: openclaw_cli_bin_path_check

- name: Symlink openclaw CLI into default PATH
  ansible.builtin.file:
    src: "{{ openclaw_npm_prefix }}/bin/openclaw"
    dest: "{{ openclaw_cli_symlink }}"
    state: link
    force: true
  when:
    - openclaw_link_cli_in_path | bool
    - openclaw_cli_bin_path_check.stat.exists | default(false)

- name: Non-interactive openclaw onboard (optional)
  ansible.builtin.import_tasks: onboard.yml
  when: openclaw_onboard_enabled | bool
  tags:
    - onboard
    - gateway

- name: Install systemd unit for OpenClaw gateway
  ansible.builtin.template:
    src: openclaw-gateway.service.j2
    dest: /etc/systemd/system/{{ openclaw_gateway_service_name }}.service
    mode: "0644"
  notify:
    - Reload systemd daemon
    - Restart openclaw gateway

- name: Set OpenClaw gateway service enabled / running state
  ansible.builtin.systemd:
    name: "{{ openclaw_gateway_service_name }}"
    enabled: "{{ openclaw_gateway_service_enabled | bool }}"
    state: "{{ openclaw_gateway_service_state }}"
    daemon_reload: true
