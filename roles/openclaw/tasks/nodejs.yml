---
# Node.js + npm on the host for the OpenClaw Gateway — docs: https://openclawdoc.com/docs/getting-started/installation/

- name: Install packages needed for NodeSource apt setup
  ansible.builtin.apt:
    name: gnupg
    state: present

- name: Ensure apt keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download NodeSource repository signing key
  ansible.builtin.get_url:
    url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
    dest: /etc/apt/keyrings/nodesource.asc
    mode: "0644"

- name: Dearmor NodeSource signing key for apt
  ansible.builtin.command:
    cmd: gpg --batch --yes --dearmor -o /etc/apt/keyrings/nodesource.gpg /etc/apt/keyrings/nodesource.asc
    creates: /etc/apt/keyrings/nodesource.gpg

- name: Add NodeSource apt repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/nodesource.list
    mode: "0644"
    content: |
      deb [signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_{{ openclaw_nodejs_major_version }}.x nodistro main
    force: true

- name: Install Node.js from NodeSource
  ansible.builtin.apt:
    name: nodejs
    state: present
    update_cache: true

- name: Show Node.js and npm versions
  ansible.builtin.command: "{{ item }}"
  register: openclaw_node_tool_versions
  loop:
    - node --version
    - npm --version
  changed_when: false

- name: Display Node.js and npm versions
  ansible.builtin.debug:
    msg: "{{ openclaw_node_tool_versions.results | map(attribute='stdout') | list }}"
