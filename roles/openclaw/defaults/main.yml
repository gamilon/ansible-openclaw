---
# OpenClaw requires Node.js 22+; upstream docs recommend 24 when available.
openclaw_nodejs_major_version: 22

# System account for the OpenClaw Gateway service (must exist before Docker group tasks).
openclaw_system_user: openclaw
openclaw_system_user_home: /opt/openclaw

# npm global prefix (OpenClaw CLI under {{ openclaw_npm_prefix }}/bin; defaults to same as home).
openclaw_npm_prefix: "{{ openclaw_system_user_home }}"

# Hybrid setup: Gateway runs on the host (Node.js above). Agent workloads use Docker.
# Set false if agents run elsewhere or you install another runtime yourself.
openclaw_install_docker_for_agents: true

# Apt packages for the container runtime (override if a release lacks docker-compose-v2).
openclaw_docker_packages:
  - docker.io
  - docker-compose-v2

# Users who must run `docker` without sudo (gateway + human admin).
openclaw_docker_users:
  - "{{ ansible_user | default('ubuntu') }}"
  - "{{ openclaw_system_user }}"

# Gateway install via npm as the service user (not root global).
openclaw_npm_package: openclaw
openclaw_npm_version: latest
# Skip npm install on later runs when CLI exists (latest) or version matches (pinned). Set true to reinstall/upgrade.
openclaw_npm_install_force: false

# Symlink npm-installed CLI into a directory on default PATH (root, openclaw, and normal logins).
openclaw_link_cli_in_path: true
openclaw_cli_symlink: /usr/local/bin/openclaw

openclaw_gateway_service_name: openclaw-gateway
# systemd: until real config exists under {{ openclaw_system_user_home }}, use enabled: false and state: stopped to avoid a flapping unit.
openclaw_gateway_service_enabled: true
openclaw_gateway_service_state: started
# Extra CLI flags for `openclaw gateway run` (e.g. "--port 18789").
openclaw_gateway_extra_args: ""
# If true, adds `--allow-unconfigured` (dev only; production should use real config).
openclaw_gateway_allow_unconfigured: false
# Extra Environment= lines for the unit ("KEY=value").
openclaw_gateway_service_environment: []

# --- openclaw onboard (non-interactive) ---
# https://openclaws.io/docs/cli/onboard — set true and supply extra_argv (+ environment for API keys in ref mode).
openclaw_onboard_enabled: false
openclaw_onboard_workspace: "{{ openclaw_system_user_home }}/.openclaw"
# Gateway unit is not running during this play by default; skip health wait (see upstream CLI automation docs).
openclaw_onboard_skip_health: true
openclaw_onboard_skip_skills: false
openclaw_onboard_accept_risk: false
openclaw_onboard_json: false
# Tokens after `openclaw onboard`, e.g. [--mode, local, --auth-choice, openai-api-key, --secret-input-mode, ref]
openclaw_onboard_extra_argv: []
# Merged with HOME for the onboard process (use for OPENAI_API_KEY, OPENCLAW_GATEWAY_TOKEN, etc.).
openclaw_onboard_environment: {}
# If set, skip onboard when this path already exists (idempotency). Leave empty to run every time onboard is enabled.
openclaw_onboard_creates: ""
# Hide argv/env in logs when true (recommended if environment contains secrets).
openclaw_onboard_no_log: true
