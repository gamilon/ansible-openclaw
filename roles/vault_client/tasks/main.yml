---
# HashiCorp Vault CLI + optional profile.d (VAULT_ADDR, VAULT_CACERT).
# Role inclusion is gated in site.yml by vault_client_install_cli.

- name: Fail if host is not Ubuntu
  ansible.builtin.fail:
    msg: "The vault_client role currently supports Ubuntu only."
  when: ansible_facts.distribution != "Ubuntu"
  tags:
    - always

- name: Vault CLI from HashiCorp releases
  tags:
    - vault
  block:
    - name: Set Vault zip architecture from ansible_architecture (gathered facts)
      ansible.builtin.set_fact:
        vault_client_zip_arch: >-
          {{ 'amd64' if ansible_architecture == 'x86_64'
          else 'arm64' if ansible_architecture == 'aarch64'
          else '' }}

    - name: Require supported CPU architecture for Vault CLI binary
      ansible.builtin.assert:
        that:
          - vault_client_zip_arch | length > 0
        fail_msg: >-
          Vault CLI install needs ansible_architecture x86_64 or aarch64 (linux_amd64 or linux_arm64 zips);
          this host reports ansible_architecture={{ ansible_architecture }}.

    - name: Ensure unzip is available for Vault archive
      ansible.builtin.apt:
        name: unzip
        state: present

    - name: Check installed Vault CLI version
      ansible.builtin.command: "{{ vault_client_install_dir }}/vault version"
      register: vault_client_version_check
      changed_when: false
      failed_when: false

    - name: Install HashiCorp Vault CLI from releases.hashicorp.com
      when: vault_client_version not in (vault_client_version_check.stdout | default(''))
      block:
        - name: Download Vault {{ vault_client_version }} zip
          ansible.builtin.get_url:
            url: >-
              https://releases.hashicorp.com/vault/{{ vault_client_version }}/vault_{{ vault_client_version }}_linux_{{ vault_client_zip_arch }}.zip
            dest: "/tmp/vault_{{ vault_client_version }}_linux_{{ vault_client_zip_arch }}.zip"
            mode: "0644"

        - name: Create temporary unpack directory for Vault
          ansible.builtin.file:
            path: "/tmp/vault-unpack-{{ vault_client_version }}"
            state: directory
            mode: "0755"

        - name: Unpack Vault archive
          ansible.builtin.unarchive:
            src: "/tmp/vault_{{ vault_client_version }}_linux_{{ vault_client_zip_arch }}.zip"
            dest: "/tmp/vault-unpack-{{ vault_client_version }}"
            remote_src: true

        - name: Install vault binary to {{ vault_client_install_dir }}
          ansible.builtin.copy:
            src: "/tmp/vault-unpack-{{ vault_client_version }}/vault"
            dest: "{{ vault_client_install_dir }}/vault"
            mode: "0755"
            remote_src: true

        - name: Remove Vault unpack directory
          ansible.builtin.file:
            path: "/tmp/vault-unpack-{{ vault_client_version }}"
            state: absent

        - name: Remove Vault zip from /tmp
          ansible.builtin.file:
            path: "/tmp/vault_{{ vault_client_version }}_linux_{{ vault_client_zip_arch }}.zip"
            state: absent

    - name: Show Vault version
      ansible.builtin.command: "{{ vault_client_install_dir }}/vault version"
      register: vault_client_version_display
      changed_when: false

    - name: Display Vault version
      ansible.builtin.debug:
        msg: "{{ vault_client_version_display.stdout_lines | default([]) }}"

- name: Ensure Vault CA certificate directory exists on remote
  ansible.builtin.file:
    path: "{{ vault_client_cacert_remote_path | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: vault_client_manage_ca | bool
  tags:
    - vault
    - vault_profile

- name: Copy Vault CA certificate to remote host
  ansible.builtin.copy:
    src: "{{ vault_client_ca_src }}"
    dest: "{{ vault_client_cacert_remote_path }}"
    owner: root
    group: root
    mode: "0644"
  when: vault_client_manage_ca | bool
  tags:
    - vault
    - vault_profile

- name: Install Vault client environment for login shells
  ansible.builtin.template:
    src: vault.sh.j2
    dest: "{{ vault_client_profile_d_path }}"
    owner: root
    group: root
    mode: "0644"
  when: >-
    (vault_client_addr | default("") | trim | length > 0)
    or (vault_client_manage_ca | bool)
  tags:
    - vault
    - vault_profile

- name: Remove Vault client profile.d snippet when no Vault client env is configured
  ansible.builtin.file:
    path: "{{ vault_client_profile_d_path }}"
    state: absent
  when: >-
    (vault_client_addr | default("") | trim | length == 0)
    and not (vault_client_manage_ca | bool)
  tags:
    - vault
    - vault_profile
